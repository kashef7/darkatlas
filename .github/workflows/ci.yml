name: DarkAtlas CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-quality:
    name: Linting & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Linter
        run: ruff check app tests

  test-suite:
    name: Automated Test Matrix (SQLite)
    needs: lint-and-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests via pytest
        env:
          DB_URL: sqlite:///:memory:
          SECRET_KEY: test_secret_key_for_ci_pipeline
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
          PORT: 8000
          APP_NAME: DarkAtlasTest
          DEBUG: "True"
        run: pytest tests/ -v

docker-build:
    name: Docker Engine Compilation Test & Push
    needs: test-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image
        run: |
          docker build -t darkatlas:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Tag and Push Image to Docker Hub
        run: |
          docker tag darkatlas:latest ${{ secrets.DOCKER_USERNAME }}/darkatlas:latest
          docker tag darkatlas:latest ${{ secrets.DOCKER_USERNAME }}/darkatlas:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/darkatlas:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/darkatlas:${{ github.sha }}